{% extends "layout.html" %}

{% block body %}

<h2 class="heading">Shopping Cart</h2>

<div class="cart-container">

    <!-- LEFT SIDE (ITEMS) -->
    <div class="cart-items">

        {% for p in products %}
        <div class="cart-card">

            <img src="{{ p.image }}">

            <div class="cart-info">
                <h3>{{ p.name }}</h3>
                <p>₹{{ p.price }}</p>

                <div class="qty">
                    <button>-</button>
                    <span>1</span>
                    <button>+</button>
                </div>
            </div>

            <span class="remove">✕</span>

        </div>
        {% endfor %}

    </div>

    <!-- RIGHT SIDE (SUMMARY) -->
    <div class="summary">

        <h3>Order Summary</h3>

        <p>Total: ₹{{ products | sum(attribute='price') }}</p>

        <!-- ✅ FIXED BUTTON -->
<button onclick="location.href='/checkout/0{{ products[0].id }}'" class="checkout">
    Checkout
</button>

    </div>

</div>

{% endblock %}
